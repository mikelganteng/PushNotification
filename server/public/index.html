<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutasi Push Notif - Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .badge { background: #22c55e; color: #052e16; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
    .stat .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    .stat .value { font-size: 1.75rem; font-weight: 700; }
    .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    button, .btn { background: #3b82f6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; }
    button:hover { background: #2563eb; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }
    button.secondary { background: #475569; }
    .list { display: flex; flex-direction: column; gap: 0.75rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1rem 1.25rem; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.5rem; }
    .card-title { font-weight: 600; font-size: 1rem; }
    .card-app { font-size: 0.75rem; color: #94a3b8; background: #334155; padding: 0.15rem 0.5rem; border-radius: 4px; }
    .card-body { color: #cbd5e1; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
    .card-meta { display: flex; gap: 1rem; margin-top: 0.75rem; font-size: 0.75rem; color: #64748b; flex-wrap: wrap; }
    .status-received { color: #22c55e; }
    .status-resent { color: #f59e0b; }
    .status-failed { color: #ef4444; }
    .empty { text-align: center; padding: 3rem; color: #64748b; }
    .actions { display: flex; gap: 0.5rem; }
    input { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Mutasi Push Notif</h1>
    <span class="badge" id="status">Connecting...</span>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="label">Total Notifikasi</div><div class="value" id="total">-</div></div>
      <div class="stat"><div class="label">Hari Ini</div><div class="value" id="today">-</div></div>
      <div class="stat"><div class="label">Resend</div><div class="value" id="resent">-</div></div>
    </div>
    <div class="toolbar">
      <button onclick="loadNotifications()">Refresh</button>
      <input type="text" id="apiKey" placeholder="API Key" value="mutasi-secret-key" style="width:200px">
    </div>
    <div class="list" id="list">
      <div class="empty">Memuat notifikasi...</div>
    </div>
  </main>
  <script>
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');

    async function loadNotifications() {
      try {
        const res = await fetch('/api/notifications?limit=100');
        const json = await res.json();
        statusEl.textContent = 'Online';
        statusEl.style.background = '#22c55e';
        document.getElementById('total').textContent = json.total;

        const todayStart = new Date(); todayStart.setHours(0,0,0,0);
        const todayCount = json.data.filter(n => n.posted_at >= todayStart.getTime()).length;
        document.getElementById('today').textContent = todayCount;
        document.getElementById('resent').textContent = json.data.filter(n => n.resend_count > 0).length;

        if (json.data.length === 0) {
          listEl.innerHTML = '<div class="empty">Belum ada notifikasi. Aktifkan app di HP Android.</div>';
          return;
        }

        listEl.innerHTML = json.data.map(n => `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${esc(n.title || '(Tanpa judul)')}</div>
                <span class="card-app">${esc(n.app_name || n.package_name)}</span>
              </div>
              <div class="actions">
                <button class="secondary" onclick="resend('${n.id}')">Resend</button>
                <button class="danger" onclick="del('${n.id}')">Hapus</button>
              </div>
            </div>
            <div class="card-body">${esc(n.big_text || n.body || '-')}</div>
            <div class="card-meta">
              <span class="status-${n.status}">${n.status}${n.resend_count > 0 ? ' (' + n.resend_count + 'x)' : ''}</span>
              <span>${formatDate(n.posted_at)}</span>
              <span>${n.device_id || 'unknown device'}</span>
            </div>
          </div>
        `).join('');
      } catch (e) {
        statusEl.textContent = 'Offline';
        statusEl.style.background = '#ef4444';
        listEl.innerHTML = '<div class="empty">Server tidak dapat dihubungi</div>';
      }
    }

    async function resend(id) {
      const key = document.getElementById('apiKey').value;
      await fetch('/api/notifications/' + id + '/resend', {
        method: 'POST',
        headers: { 'X-API-Key': key }
      });
      loadNotifications();
    }

    async function del(id) {
      if (!confirm('Hapus notifikasi ini?')) return;
      const key = document.getElementById('apiKey').value;
      await fetch('/api/notifications/' + id, {
        method: 'DELETE',
        headers: { 'X-API-Key': key }
      });
      loadNotifications();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleString('id-ID');
    }

    loadNotifications();
    setInterval(loadNotifications, 5000);
  </script>
</body>
</html>
